{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow p-4">

                <div class="text-center mb-4">
                    <span style="font-size:3rem;">👤</span>
                    <h3 class="fw-bold text-primary mt-2">Welcome Back!</h3>
                    <p class="text-muted">Login to your DocEase account</p>
                </div>

                {% if messages %}
                {% for msg in messages %}
                <div class="alert alert-{{ msg.tags }} alert-dismissible">
                    {{ msg }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endfor %}
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="text" name="username" 
                               class="form-control form-control-lg" 
                               placeholder="Enter your email" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" name="password" 
                               class="form-control form-control-lg" 
                               placeholder="Enter password" required>
                    </div>
                    <button type="submit" 
                            class="btn btn-primary w-100 fw-bold py-2 fs-5">
                        Login
                    </button>
                </form>

                <p class="text-center mt-3 text-muted">
                    New to DocEase? 
                    <a href="/register/" class="text-primary fw-bold">Register here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
